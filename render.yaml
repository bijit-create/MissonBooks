services:
  - type: web
    name: mission-books
    runtime: node
    repo: https://github.com/bijit-create/MissonBooks
    branch: main
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production node --import tsx/esm server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEYS
        sync: false
      - key: PORT
        value: "3000"
